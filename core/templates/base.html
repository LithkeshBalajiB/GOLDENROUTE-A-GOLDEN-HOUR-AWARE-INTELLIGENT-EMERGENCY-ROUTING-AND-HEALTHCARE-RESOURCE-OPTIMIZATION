<!DOCTYPE html>
<html>
<head>
<title>GoldenRoute Emergency System</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6f8;
margin:0;
}

header{
background:#1e3a8a;
color:white;
padding:15px;
text-align:center;
}

.container{
width:90%;
max-width:1000px;
margin:auto;
margin-top:30px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0px 2px 10px rgba(0,0,0,0.1);
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 18px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

input, select, textarea{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}
.spec-table{
border-collapse:collapse;
margin-top:10px;
}

.spec-table td{
padding:6px 10px;
text-align:left;
border:none;
}

.spec-table input{
width:18px;
height:18px;
}
th, td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#f1f5f9;
}

.alert{
background:#fee2e2;
border-left:5px solid red;
padding:10px;
margin:10px 0;
}

.success{
background:#dcfce7;
border-left:5px solid green;
padding:10px;
margin:10px 0;
}

</style>

</head>

<body>

<header>
<h2>🚑 GoldenRoute Emergency System</h2>
</header>

<div class="container">

{% block content %}

{% endblock %}

</div>

</body>
</html>
